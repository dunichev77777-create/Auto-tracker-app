name: Build iOS IPA

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build iOS IPA
      run: flutter build ipa --${{ github.event.inputs.build_type || 'release' }}
      
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: mycar-ios-${{ github.event.inputs.build_type || 'release' }}
        path: build/ios/ipa/*.ipa
        retention-days: 30
        
    - name: Get IPA size
      run: |
        ls -lh build/ios/ipa/*.ipa
