name: Build Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build Android APK
      run: flutter build apk --${{ github.event.inputs.build_type || 'release' }}
    
    - name: Rename APK
      run: |
        mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/auto_tracker_release_0.1.apk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: mycar-android-${{ github.event.inputs.build_type || 'release' }}
        path: build/app/outputs/flutter-apk/auto_tracker_release_0.1.apk
        retention-days: 30
        
    - name: Get APK size
      run: |
        ls -lh build/app/outputs/flutter-apk/auto_tracker_release_0.1.apk
