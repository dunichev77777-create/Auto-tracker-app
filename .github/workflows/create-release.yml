name: Create Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.1.0)'
        required: true
        default: 'v0.1.0'

jobs:
  build-android:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Java
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '17'
    
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
    
    - name: Build Android APK
      run: flutter build apk --release
    
    - name: Rename APK
      run: |
        mv build/app/outputs/flutter-apk/app-release.apk build/app/outputs/flutter-apk/auto_tracker_release_0.1.apk
    
    - name: Upload APK artifact
      uses: actions/upload-artifact@v4
      with:
        name: android-apk
        path: build/app/outputs/flutter-apk/auto_tracker_release_0.1.apk
        retention-days: 7

  build-ios:
    runs-on: macos-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.44.5'
        channel: 'stable'
        cache: true
        
    - name: Install dependencies
      run: flutter pub get
      
    - name: Build iOS IPA
      run: flutter build ipa --release --no-codesign
    
    - name: List build output
      run: |
        echo "=== Build directory structure ==="
        find build -type d 2>/dev/null || echo "No build directory"
        echo "=== Looking for IPA files ==="
        find build -name "*.ipa" 2>/dev/null || echo "No IPA files found"
        echo "=== All files in build directory ==="
        find build -type f 2>/dev/null | head -20 || echo "No files found"
    
    - name: Rename IPA
      run: |
        IPA_FILE=$(find build -name "*.ipa" 2>/dev/null | head -n 1)
        if [ -n "$IPA_FILE" ]; then
          echo "Found IPA: $IPA_FILE"
          mkdir -p build/ios/ipa
          cp "$IPA_FILE" build/ios/ipa/auto_tracker_release_0.1.ipa
        else
          echo "No IPA file found in build directory"
          exit 1
        fi
        
    - name: Upload IPA artifact
      uses: actions/upload-artifact@v4
      with:
        name: ios-ipa
        path: build/ios/ipa/auto_tracker_release_0.1.ipa
        retention-days: 7

  create-release:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Download Android APK
      uses: actions/download-artifact@v4
      with:
        name: android-apk
        path: artifacts
    
    - name: Download iOS IPA
      uses: actions/download-artifact@v4
      with:
        name: ios-ipa
        path: artifacts
    
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.inputs.tag || github.ref_name }}
        name: Auto Tracker ${{ github.event.inputs.tag || github.ref_name }}
        body: |
          ## Auto Tracker Release
          
          ### Downloads:
          - **Android APK:** `auto_tracker_release_0.1.apk`
          - **iOS IPA:** `auto_tracker_release_0.1.ipa`
          
          ### Installation:
          
          **Android:**
          1. Download APK file
          2. Enable "Install from unknown sources" in settings
          3. Open APK file to install
          
          **iOS:**
          1. Download IPA file
          2. Install via TestFlight, AltStore, or Ad-hoc
          3. See installation guides in repository
          
          ### Changes:
          - Keyboard layout fixes for dialogs
          - Maintenance calculation logic improvements
          - App icon generation
          - iOS and Android build automation
        files: |
          artifacts/auto_tracker_release_0.1.apk
          artifacts/auto_tracker_release_0.1.ipa
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
